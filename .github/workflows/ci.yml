name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m py_compile *.py
      # pyflakes is a dev/CI-only tool — it doesn't change the zero-runtime-dependency claim.
      # Catches undefined names and unused imports that py_compile (syntax only) misses.
      - run: pip install pyflakes
      - run: python -m pyflakes *.py
