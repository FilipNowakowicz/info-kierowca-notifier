name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset_name: info-kierowca-notifier-windows.exe
            dist_name: info-kierowca-notifier.exe
          - os: macos-latest
            asset_name: info-kierowca-notifier-macos
            dist_name: info-kierowca-notifier
          - os: ubuntu-latest
            asset_name: info-kierowca-notifier-linux
            dist_name: info-kierowca-notifier
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyinstaller
      - run: pyinstaller pyinstaller.spec
      - name: Rename artifact
        shell: bash
        run: mv "dist/${{ matrix.dist_name }}" "${{ matrix.asset_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
